repos:
  - repo: https://github.com/pre-commit/mirrors-prettier
    rev: v4.0.0-alpha.8
    hooks:
      - id: prettier
        types_or: [markdown, yaml]

  - repo: https://github.com/python-jsonschema/check-jsonschema
    rev: 0.31.3
    hooks:
      - id: check-jsonschema
        name: Validate hackathon YAML against schema
        files: ^hackathons/.*\.yaml$
        args:
          - --schemafile
          - schemas/hackathon-form.schema.json
