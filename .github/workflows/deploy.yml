name: Deploy

on:
  push:
    branches: [main]

# Write permission for GHCR package push, id-token for AWS OIDC
permissions:
  contents: read
  packages: write
  id-token: write

jobs:
  # ── CI checks (same as ci.yml) ──────────────────────────────────────
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - run: pip install -e ".[dev]"

      - name: Lint
        run: ruff check src/ tests/

      - name: Format
        run: ruff format --check src/ tests/

      - name: Type check
        run: mypy src/

      - name: Test
        run: pytest tests/ -q

  # ── Build Docker image, deploy infra, restart service ───────────────
  deploy:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # ── Docker image → GHCR ──────────────────────────────────────────
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/nf-core/nf-core-slackbot:latest
            ghcr.io/nf-core/nf-core-slackbot:${{ github.sha }}

      # ── AWS CDK deploy ───────────────────────────────────────────────
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: eu-west-1

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install CDK
        run: npm install -g aws-cdk

      - name: Install CDK dependencies
        run: pip install -r infra/requirements.txt

      - name: CDK deploy
        run: cdk deploy --require-approval never
        working-directory: infra

      # ── Force ECS to pick up the new image ───────────────────────────
      - name: Force new ECS deployment
        run: |
          SERVICE=$(aws ecs list-services --cluster nf-core-bot --region eu-west-1 --query 'serviceArns[0]' --output text)
          aws ecs update-service --cluster nf-core-bot --service "$SERVICE" --force-new-deployment --region eu-west-1
